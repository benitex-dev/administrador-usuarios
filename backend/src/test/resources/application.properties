# Configuraciones varias
spring.application.name=administrador-usuarios

# Configuraciones de seguridad
spring.security.user.name=${SS_USER:admin}
spring.security.user.password=${SS_PASSWORD:1234}

# Configuraciones de BD (Cambiado a Postgres)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${BD_URL:jdbc:postgresql://localhost:5432/administradorUsuariosDB?serverTimezone=UTC}
spring.datasource.username=${BD_USER:postgres}
spring.datasource.password=${BD_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver


#Config de JWT
security.jwt.private.key=${PRIVATE_KEY:dev_key}
#Ac� puedo "inventar" el "nombre de usuario" que quiera
security.jwt.user.generator=${USER_GENERATOR:dev}

