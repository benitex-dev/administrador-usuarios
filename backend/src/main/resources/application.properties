# Configuraciones varias
spring.application.name=administrador-usuarios

# Configuraciones de seguridad
spring.security.user.name=${SS_USER}
spring.security.user.password=${SS_PASSWORD}

# Configuraciones de BD
spring.jpa.hibernate.ddl-auto=create


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${BD_URL}

spring.datasource.username=${BD_USER}
spring.datasource.password=${BD_PASSWORD}


#Config de JWT
security.jwt.private.key=${PRIVATE_KEY:dev_key}
#Aca puedo "inventar" el "nombre de usuario" que quiera
security.jwt.user.generator=${USER_GENERATOR:dev}

