# Configuraciones varias
spring.application.name=administrador-usuarios

# Configuraciones de seguridad
spring.security.user.name=${SS_USER:admin}
spring.security.user.password=${SS_PASSWORD:1234}

# Configuraciones de BD
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${BD_URLBD_URL:jdbc:mysql://localhost:3306/administradorUsuariosDB?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${BD_USER:root}
spring.datasource.password=${BD_PASSWORD:root}


#Config de JWT
security.jwt.private.key=${PRIVATE_KEY:dev_key}
#Ac� puedo "inventar" el "nombre de usuario" que quiera
security.jwt.user.generator=${USER_GENERATOR:dev}

