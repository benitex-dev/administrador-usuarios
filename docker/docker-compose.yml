services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-spring-security
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: administradorUsuariosDB
    restart: always
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      timeout: 10s
      retries: 10
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  admin-users-app:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: administrador-usuarios-app
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      BD_URL: jdbc:mysql://mysql-db:3306/administradorUsuariosDB?createDatabaseIfNotExist=true&serverTimezone=UTC
      BD_USERNAME: root
      BD_PASSWORD: root
volumes:
  mysql_data: